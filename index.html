<style>
  :root{
    --bg:#ccc; --fg:#000; --dim:0.22;
    --menu-bg: rgba(204,204,204,0.94);
    --menu-border: rgba(0,0,0,0.35);
  }
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--fg);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size:14px; line-height:1.68; overflow-x:hidden;
  }

  #mind{
    position:fixed; inset:0; width:100%; height:100%;
    object-fit:cover; opacity:0.085;
    filter: blur(2px) contrast(0.95) saturate(0.9);
    pointer-events:none; z-index:-2;
  }

  .wrap{ padding:44px 52px; max-width:980px; }
  #stream{ white-space:pre-wrap; margin:0; }
  .entry{ display:block; margin:0 0 10px 0; transition:opacity 160ms ease; }
  .entry.dim{ opacity:var(--dim); }

  a{ color:inherit; text-decoration:none; }
  a:hover{ text-decoration:underline; }

  .cursor{
    display:inline-block; width:0.65em;
    animation: blink 1.05s steps(1) infinite;
  }
  @keyframes blink{ 0%,49%{opacity:1} 50%,100%{opacity:0} }

  #menu{
    position:fixed; right:18px; top:18px; width:220px;
    background:var(--menu-bg);
    border:1px solid var(--menu-border);
    padding:10px 10px 12px 10px;
    z-index:20; user-select:none;
  }
  #menu .logoRow{ display:flex; align-items:center; gap:10px; }
  #menu img{ width:28px; height:28px; object-fit:contain; display:block; }
  .rule{ margin:10px 0; opacity:0.6; }
  .menuLink{ display:block; padding:2px 4px; }

  #tagSection{ display:none; }
  body.view-cv #tagSection{ display:block; }

  #tags{
    display:flex; flex-direction:column; gap:6px;
    margin:8px 0 6px 0;
    max-height: calc(100vh - 210px);
    overflow-y:auto; padding-right:4px;
  }
  .tag{
    display:inline-flex; align-items:center;
    cursor:pointer; padding:2px 4px; border-radius:4px;
  }
  .tag:hover{ background: rgba(0,0,0,0.06); }
  .tag.on{ background: rgba(0,0,0,0.10); outline:1px solid rgba(0,0,0,0.25); }

  @media (max-width:760px){
    .wrap{ padding:28px 18px 140px 18px; }
    #menu{ left:10px; right:10px; top:auto; bottom:10px; width:auto; }
    #tags{
      flex-direction:row; gap:8px;
      overflow-x:auto; overflow-y:hidden;
      max-height:none; white-space:nowrap; padding-bottom:2px;
    }
    .tag{ flex:0 0 auto; }
  }

  @media (prefers-reduced-motion: reduce){
    .cursor{ animation:none; }
  }

  /* mobile keyboard helper on home */
  #mobileInput{
    display:none;
    position:fixed;
    left:18px;
    right:18px;
    top:18px;
    bottom:18px;
    z-index:10; /* below menu, above stream */
    background:transparent;
    color:transparent;
    caret-color:transparent;
    border:0;
    outline:none;
    resize:none;
    opacity:0.01;
    font: inherit;
  }
  body.view-home #mobileInput{ display:block; }
  @media (max-width:760px){
    #mobileInput{
      left:18px;
      right:18px;
      top:18px;
      bottom:140px; /* keep menu clickable */
    }
  }


  .projectTitle{
    font-size:1.12em;
    letter-spacing:0.01em;
  }
  .projectBlock .body{
    display:block;
    padding-left:4ch;
  }
  .projectBlock .body a{
    color:inherit;
  }

<script>

  {date:"2021-09-01", title:"RUTH", role:"Director / Editor / Sound Designer", context:"Film", url:"https://hypatia-trust.org.uk/women-of-cornish-music", tags:["sound","art","creative"]},

  {date:"2019-01-01", title:"APT Gallery", role:"Exhibition", context:"Idle Institute, London", url:"https://idle.institute/", tags:["art","exhibition"]},
  {date:"2019-01-01", title:"Xero Kline & Coma", role:"Exhibition", context:"Idle Institute, London", url:"https://idle.institute/", tags:["art","exhibition"]},
  {date:"2018-01-01", title:"Royal College of Art Degree Show 1", role:"Exhibition", context:"Idle Institute, London", url:"https://idle.institute/", tags:["art","exhibition"]},
  {date:"2018-01-01", title:"Filet Space", role:"Exhibition", context:"London", url:"", tags:["art","exhibition"]},
  {date:"2017-01-01", title:"Red Mansion Art Prize (RCA)", role:"Exhibition", context:"Idle Institute, London", url:"https://idle.institute/", tags:["art","exhibition"]},
  {date:"2017-01-01", title:"Red Mansion showcase", role:"Exhibition", context:"Idle Institute, Beijing", url:"https://idle.institute/", tags:["art","exhibition"]},
  {date:"2016-01-01", title:"Central Saint Martins Degree Show", role:"Exhibition", context:"London", url:"", tags:["art","exhibition"]},
  {date:"2015-01-01", title:"Hidden Indexes", role:"Solo exhibition", context:"Berlin", url:"", tags:["art","exhibition"]}
];

const CONTACT_LINES = [
  "eliothenryallison@gmail.com"
];

const PROJECTS = {
  "friendly pickle jingle": {
    displayTitle: "ea.001_FRIENDLY_PICKLE_JINGLE",
    password: "1234",
    updates: [
      {
        date: "2026_03_26_offers",
        message: ["Hey Ben,", "please find the first offers below.", "Hope all's good!"],
        files: [
          "projects/ea.001_friendly_pickle_jingle/2026_03_26_offers/picklegroove.mp3",
          "projects/ea.001_friendly_pickle_jingle/2026_03_26_offers/picklefarm.mp3",
          "projects/ea.001_friendly_pickle_jingle/2026_03_26_offers/picklejingle.mp3"
        ],
        zip: "projects/ea.001_friendly_pickle_jingle/2026_03_26_offers/ea.001_friendly_pickle_jingle_2026_03_26_offers.zip"
      }
    ]
  }
};

const REVEAL_PER_SECOND = 5;

const streamEl = document.getElementById("stream");
const tagsEl = document.getElementById("tags");
const mobileInput = document.getElementById("mobileInput");

let selectedTags = new Set();
let revealTimer = null;
let revealIndex = 0;

let homeBuffer = "";
let homeEraseTimer = null;
let passwordMode = false;
let passwordBuffer = "";
let pendingProjectKey = null;

function escHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function formatDateYM(dateStr){
  if(!dateStr) return "";
  return dateStr.slice(0,7);
}

function sortEntries(entries){
  return [...entries].sort((a,b) => (b.date||"").localeCompare(a.date||""));
}

function buildTagSet(entries){
  const s = new Set();
  for(const e of entries){
    for(const t of (e.tags||[])) s.add(t);
  }
  return s;
}

function renderTags(entries){
  const allowed = new Set(["theatre","sound","music","art","exhibition","labour","creative"]);
  const tagSet = new Set([...buildTagSet(entries)].filter(t => allowed.has(t)));
  const sorted = ["all", ...Array.from(tagSet).sort((a,b)=>a.localeCompare(b))];

  tagsEl.innerHTML = "";
  for(const t of sorted){
    const div = document.createElement("div");
    div.className = "tag";
    div.dataset.tag = t;
    div.textContent = "#" + t;
    div.addEventListener("click", () => {
      if(t === "all"){ selectedTags.clear(); applyHighlighting(); return; }
      if(selectedTags.has(t)) selectedTags.delete(t); else selectedTags.add(t);
      applyHighlighting();
    });
    tagsEl.appendChild(div);
  }
}

function applyHighlighting(){
  const tagEls = tagsEl.querySelectorAll(".tag");
  tagEls.forEach(el => {
    const t = el.dataset.tag;
    el.classList.toggle("on", selectedTags.has(t));
  });

  const entries = streamEl.querySelectorAll(".entry");
  if(selectedTags.size === 0){
    entries.forEach(el => el.classList.remove("dim"));
    return;
  }
  entries.forEach(el => {
    const tags = (el.dataset.tags||"").split(/\s+/).filter(Boolean);
    const match = tags.some(t => selectedTags.has(t));
    el.classList.toggle("dim", !match);
  });
}

function clearStream(){
  if(revealTimer) clearInterval(revealTimer);
  revealTimer = null;
  revealIndex = 0;
  streamEl.innerHTML = "";
}

function appendCursor(){
  const cur = document.createElement("span");
  cur.className = "cursor";
  cur.textContent = "█";
  streamEl.appendChild(cur);
}

function entryNode(e){
  const span = document.createElement("span");
  span.className = "entry";
  span.dataset.tags = (e.tags||[]).join(" ");

  const d = formatDateYM(e.date).padEnd(8, " ");
  const title = e.title || "";
  const line1Prefix = d + "    ";

  let line1Html = escHtml(line1Prefix);
  if(e.url){
    line1Html += `<a href="${escHtml(e.url)}" target="_blank" rel="noreferrer">${escHtml(title)}</a>`;
  }else{
    line1Html += escHtml(title);
  }

  const lines = [];
  lines.push(line1Html);
  if(e.role) lines.push(escHtml("            " + e.role));
  if(e.context) lines.push(escHtml("            " + e.context));

  span.innerHTML = lines.join("\n");
  return span;
}

function htmlEntry(html){
  const span = document.createElement("span");
  span.className = "entry";
  span.innerHTML = html;
  return span;
}

function typeEntries(entries){
  clearStream();
  const sorted = sortEntries(entries);

  appendCursor();
  const cursor = () => streamEl.querySelector(".cursor");
  const ms = Math.max(50, Math.floor(1000 / REVEAL_PER_SECOND));

  revealTimer = setInterval(() => {
    if(revealIndex >= sorted.length){
      clearStream();
      for(const e of sorted){
        const node = entryNode(e);
        streamEl.appendChild(node);
        streamEl.appendChild(document.createTextNode("\n\n"));
      }
      appendCursor();
      applyHighlighting();
      return;
    }
    const e = sorted[revealIndex++];
    const node = entryNode(e);
    streamEl.insertBefore(node, cursor());
    streamEl.insertBefore(document.createTextNode("\n\n"), cursor());
    applyHighlighting();
  }, ms);
}

function typeLines(lines){
  clearStream();
  appendCursor();
  const cursorEl = () => streamEl.querySelector(".cursor");
  let i = 0;
  const ms = Math.max(60, Math.floor(1000 / 12));

  const timer = setInterval(() => {
    if(i >= lines.length){
      clearInterval(timer);
      return;
    }
    const span = document.createElement("span");
    span.className = "entry";
    span.textContent = lines[i++];
    streamEl.insertBefore(span, cursorEl());
    streamEl.insertBefore(document.createTextNode("\n\n"), cursorEl());
  }, ms);
}

function typeCustomNodes(nodes){
  clearStream();
  appendCursor();
  const cursor = () => streamEl.querySelector(".cursor");
  const ms = Math.max(50, Math.floor(1000 / REVEAL_PER_SECOND));

  revealTimer = setInterval(() => {
    if(revealIndex >= nodes.length){
      clearStream();
      for(const node of nodes){
        streamEl.appendChild(node);
        streamEl.appendChild(document.createTextNode("\n\n"));
      }
      appendCursor();
      return;
    }
    const node = nodes[revealIndex++];
    streamEl.insertBefore(node, cursor());
    streamEl.insertBefore(document.createTextNode("\n\n"), cursor());
  }, ms);
}

function showHome(){
  clearStream();
  passwordMode = false;
  passwordBuffer = "";
  pendingProjectKey = null;
  const t = document.createElement("span");
  t.id = "homeText";
  t.textContent = "";
  streamEl.appendChild(t);
  appendCursor();
}

function showCv(){ typeEntries(ENTRIES); }
function showContact(){ typeLines(CONTACT_LINES); }

function showProject(project){
  revealIndex = 0;
  const nodes = [];

  nodes.push(htmlEntry('<span class="projectTitle">'+escHtml(project.displayTitle)+'</span>'));

  for(const update of project.updates){
    const parts = [];
    parts.push(escHtml(update.date));
    parts.push('<span class="body">');

    if(update.message && update.message.length){
      for(const line of update.message){
        parts.push(escHtml(line));
      }
      parts.push('');
    }

    for(const filePath of update.files){
      const fileName = filePath.split("/").pop();
      parts.push(`<a href="${escHtml(filePath)}" target="_blank" rel="noreferrer">${escHtml(fileName)}</a>`);
    }

    if(update.zip){
      parts.push('');
      parts.push(`<a href="${escHtml(update.zip)}" download>↓ [all]</a>`);
    }

    parts.push('');
    parts.push(`<a href="mailto:eliothenryallison@gmail.com?subject=${encodeURIComponent(project.displayTitle + '_' + update.date)}">reply →</a>`);
    parts.push('</span>');

    const block = document.createElement("span");
    block.className = "entry projectBlock";
    block.innerHTML = parts.join("\n");
    nodes.push(block);
  }

  typeCustomNodes(nodes);
}

function setView(view){
  document.body.classList.remove("view-home","view-cv","view-contact","view-project");
  document.body.classList.add(`view-${view}`);
}

function route(){
  if(typeof resetHomeInput === 'function') resetHomeInput();
  const hash = (location.hash || "#home").toLowerCase();
  if(hash === "#cv"){
    setView("cv");
    showCv();
  } else if(hash === "#contact"){
    setView("contact");
    showContact();
  } else if(hash.startsWith("#project-")){
    const key = decodeURIComponent(hash.replace("#project-",""));
    const project = PROJECTS[key];
    if(project){
      setView("project");
      showProject(project);
    } else {
      setView("home");
      showHome();
    }
  } else {
    setView("home");
    showHome();
  }
}

window.addEventListener("hashchange", route);

document.getElementById("linkCv").addEventListener("click", (e) => {
  if((location.hash || "#home").toLowerCase() === "#cv"){
    e.preventDefault();
    location.hash = "#home";
  }
});

document.getElementById("linkContact").addEventListener("click", (e) => {
  if((location.hash || "#home").toLowerCase() === "#contact"){
    e.preventDefault();
    location.hash = "#home";
  }
});

function resetHomeInput(){
  homeBuffer = "";
  if(homeEraseTimer) clearTimeout(homeEraseTimer);
  homeEraseTimer = null;
  passwordMode = false;
  passwordBuffer = "";
  pendingProjectKey = null;
  const ht = document.getElementById("homeText");
  if(ht) ht.textContent = "";
}

function inHome(){
  return document.body.classList.contains("view-home");
}

function startPasswordPrompt(projectKey){
  passwordMode = true;
  passwordBuffer = "";
  pendingProjectKey = projectKey;
  clearStream();

  const p1 = document.createElement("span");
  p1.className = "entry";
  p1.textContent = "password:";
  streamEl.appendChild(p1);

  const p2 = document.createElement("span");
  p2.className = "entry";
  p2.id = "passwordText";
  p2.textContent = "";
  streamEl.appendChild(p2);

  streamEl.appendChild(document.createTextNode("\n"));
  appendCursor();
  if(mobileInput){
  mobileInput.addEventListener("input", () => {
    if(!inHome()) return;

    const raw = mobileInput.value || "";
    const submitted = raw.includes("\n") || raw.includes("\r");
    const cleaned = raw.replace(/[\n\r]/g, "");

    // Keep the textarea value in sync so iOS backspace behaves properly
    if(mobileInput.value !== cleaned) mobileInput.value = cleaned;

    if(passwordMode){
      passwordBuffer = cleaned;
      updatePasswordDisplay();
      if(submitted){
        submitPassword();
      }
    } else {
      homeBuffer = cleaned;
      syncHomeDisplay();
      if(submitted){
        submitCommand();
      }
    }
  });

  mobileInput.addEventListener("keydown", (e) => {
    if(!inHome()) return;
    // On some browsers keydown still fires for Enter before input; support both
    if(e.key === "Enter"){
      e.preventDefault();
      if(passwordMode){
        submitPassword();
      } else {
        submitCommand();
      }
    }
  });

  document.addEventListener("click", (e) => {
    if(!inHome()) return;
    const menu = document.getElementById("menu");
    if(menu && menu.contains(e.target)) return;
    mobileInput.focus();
  });
}

document.addEventListener("keydown"document.addEventListener("keydown", (e) => {
  if(!inHome()) return;
  if(mobileInput && document.activeElement === mobileInput) return;
  if(e.ctrlKey || e.metaKey || e.altKey) return;

  if(passwordMode){
    if(e.key === "Backspace"){
      e.preventDefault();
      passwordBuffer = passwordBuffer.slice(0, -1);
      updatePasswordDisplay();
      return;
    }

    if(e.key === "Enter"){
      e.preventDefault();
      submitPassword();
      return;
    }

    if(e.key.length === 1){
      passwordBuffer += e.key;
      updatePasswordDisplay();
    }
    return;
  }

  const ht = document.getElementById("homeText");
  if(!ht) return;

  if(e.key === "Backspace"){
    e.preventDefault();
    homeBuffer = homeBuffer.slice(0, -1);
    ht.textContent = homeBuffer;
    return;
  }

  if(e.key === "Enter"){
    e.preventDefault();
    submitCommand();
    return;
  }

  if(e.key.length === 1){
    homeBuffer += e.key;
    ht.textContent = homeBuffer;
  }
});

renderTags(ENTRIES);
route();
</script>
</body>
</html>
